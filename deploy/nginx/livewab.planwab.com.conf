# =============================================================================
# liveWAB — Nginx vhost for livewab.planwab.com
#
# Install:  /etc/nginx/sites-available/livewab.planwab.com.conf
# Enable:   ln -s ../sites-available/livewab.planwab.com.conf /etc/nginx/sites-enabled/
#
# This coexists with the existing planwab.com vhost — server_name routing
# keeps them independent. Nothing here touches the main site's config.
# =============================================================================

# Trust Cloudflare's forwarded client IP. Without this every request appears
# to come from a Cloudflare edge node, which breaks rate limiting and logs.
# Refresh the list occasionally: https://www.cloudflare.com/ips/
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

upstream livewab_app {
    # Matches the 127.0.0.1:3100 binding in docker-compose.yml.
    server 127.0.0.1:3100;
    keepalive 32;
}

# ------------------------------------------------------------------ HTTP
server {
    listen 80;
    listen [::]:80;
    server_name livewab.planwab.com;

    # Certbot writes its challenge files here.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------------- HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name livewab.planwab.com;

    ssl_certificate     /etc/letsencrypt/live/livewab.planwab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livewab.planwab.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:LIVEWAB_SSL:10m;
    ssl_session_timeout 1d;

    # HSTS is set at the origin so it survives if Cloudflare is bypassed.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # The live room needs camera + mic for broadcasting sellers.
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self)" always;

    # Product/category images are downscaled client-side to ~1080px, but the
    # local-disk upload route accepts up to 3MB. 8MB leaves comfortable room.
    client_max_body_size 8M;
    client_body_timeout 60s;

    # Compress text responses; images and video are already compressed.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml;

    access_log /var/log/nginx/livewab.access.log;
    error_log  /var/log/nginx/livewab.error.log warn;

    # ---- Immutable build assets -------------------------------------------
    # Filenames are content-hashed, so they can be cached indefinitely.
    location /_next/static/ {
        proxy_pass http://livewab_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ---- Webhooks ---------------------------------------------------------
    # Razorpay, Clerk and Eshopbox POST here. Two things matter:
    #  1. Signature verification reads the RAW body, so no buffering games.
    #  2. These must never be rate-limited or challenged — a blocked webhook
    #     silently strands orders. Cloudflare needs a matching WAF skip rule.
    location /api/webhooks/ {
        proxy_pass http://livewab_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # ---- Application ------------------------------------------------------
    location / {
        proxy_pass http://livewab_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Upgrade headers let Next's dev/HMR and any future WebSocket route
        # work. LiveKit media does NOT pass through here — browsers connect
        # straight to the LiveKit server over wss://.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Streaming-friendly: don't buffer server-rendered chunks.
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
