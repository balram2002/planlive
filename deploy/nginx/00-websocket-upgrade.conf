# =============================================================================
# WebSocket upgrade map — required by the $connection_upgrade variable used in
# livewab.planwab.com.conf.
#
# Install to: /etc/nginx/conf.d/00-websocket-upgrade.conf
#
# IMPORTANT: this must exist exactly ONCE across the whole Nginx config. If
# your planwab.com vhost already defines a `map ... $connection_upgrade`,
# skip this file — a duplicate map directive makes `nginx -t` fail with
# "duplicate variable name".
#
# Check first:
#   grep -rn "connection_upgrade" /etc/nginx/
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
